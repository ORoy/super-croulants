<script>
const SHEET_ID = "1ox-qt2fNqSYlord98tRPTX7S5L4TlnwjVltQDPoo4R4";
const RANGE = "Classement Joueurs 2025-26"; // Sheet/tab name or range
const API_KEY = "YOUR_API_KEY"; // <-- Replace with your Google API key

const URL = `https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/${encodeURIComponent(RANGE)}?key=${API_KEY}`;

fetch(URL)
  .then(res => res.json())
  .then(json => {
    if (!json.values || !json.values.length) return;
    const [header, ...rows] = json.values;
    const container = document.getElementById("tables-container");
    container.innerHTML = "";

    // Simple: show all data in one table (customize as needed)
    let html = `<table><thead><tr>${header.map(h => `<th>${h}</th>`).join("")}</tr></thead><tbody>`;
    html += rows.map(row =>
      `<tr>${header.map((_, i) => `<td>${row[i] || ""}</td>`).join("")}</tr>`
    ).join("");
    html += "</tbody></table>";
    container.innerHTML = html;
  })
  .catch(err => {
    document.body.innerHTML += "<p>Error loading data</p>";
    console.error(err);
  });
</script>
